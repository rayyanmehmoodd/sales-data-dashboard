<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chocolate Sales Dashboard</title>

  <!-- 
    =====================================================================
    CHOCOLATE SALES INTERACTIVE DASHBOARD — D3.js
    =====================================================================
    
    DATA PREPROCESSING:
    - The CSV is loaded via d3.csv(). On load we parse the "Amount" field
      by stripping "$" and "," characters and converting to float.
    - The "Date" field is parsed from DD/MM/YYYY to a JavaScript Date.
    - "Boxes Shipped" is coerced to integer.
    - Any rows with NaN amounts or invalid dates are filtered out.
    
    CHARTS CREATED:
    1. KPI Summary Cards — total revenue, boxes, transactions, avg order.
    2. Bar Chart — Revenue by Country (with click-to-filter).
    3. Line Chart — Monthly Revenue Trend over time.
    4. Donut / Pie Chart — Revenue share by Product.
    5. Scatter Plot — Amount vs Boxes Shipped per transaction.
    6. Stacked Bar Chart — Revenue by Country broken down by Year.
    7. Horizontal Bar Chart — Top 10 Salespeople by Revenue.
    
    INTERACTIVITY:
    - Dropdown filters for Country, Product, Salesperson, and Year.
    - All charts update dynamically when any filter changes.
    - Tooltips on every chart element (hover).
    - Smooth D3 transitions / animations on data changes.
    - Click a country bar to filter dashboard to that country.
    - CSV upload: users can upload a replacement CSV file.
    - Legends for color-coded charts.
    - Responsive SVG containers via viewBox.
    
    ERROR HANDLING:
    - If the CSV fails to load, an error banner is shown.
    - If the uploaded file has bad structure, the user is alerted.
    =====================================================================
  -->

  <!-- D3.js v7 -->
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <!-- Google Fonts for a clean look -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ── Global Reset & Typography ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 24px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      border-bottom: 2px solid #e94560;
    }
    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 span.emoji { font-size: 2rem; }

    /* ── Upload Button ── */
    .upload-wrapper {
      position: relative;
      display: inline-block;
    }
    .upload-btn {
      background: #e94560;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }
    .upload-btn:hover { background: #c73652; }
    .upload-wrapper input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    /* ── Filter Bar ── */
    .filters {
      background: #1a1a2e;
      padding: 16px 40px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      border-bottom: 1px solid #222244;
    }
    .filters label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
    }
    .filters select {
      background: #16213e;
      color: #e0e0e0;
      border: 1px solid #333;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
      transition: border 0.3s;
    }
    .filters select:hover,
    .filters select:focus { border-color: #e94560; }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .reset-btn {
      background: transparent;
      color: #e94560;
      border: 1px solid #e94560;
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s;
      margin-left: auto;
    }
    .reset-btn:hover { background: #e94560; color: #fff; }

    /* ── KPI Cards ── */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 24px 40px;
    }
    .kpi-card {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 24px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid #222244;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .kpi-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(233, 69, 96, 0.15);
    }
    .kpi-card .value {
      font-size: 1.8rem;
      font-weight: 700;
      color: #e94560;
    }
    .kpi-card .label {
      font-size: 0.85rem;
      color: #999;
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ── Dashboard Grid ── */
    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 0 40px 40px;
    }
    .chart-card {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #222244;
      overflow: hidden;
    }
    .chart-card.full-width { grid-column: 1 / -1; }
    .chart-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: #ccc;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chart-title .icon { font-size: 1.2rem; }

    /* ── SVG Styling ── */
    svg { width: 100%; height: auto; display: block; }
    .axis text { fill: #888; font-size: 11px; }
    .axis line, .axis path { stroke: #333; }
    .grid line { stroke: #222244; stroke-dasharray: 2,3; }
    .grid path { stroke: none; }

    /* ── Tooltip ── */
    .tooltip {
      position: fixed;
      pointer-events: none;
      background: rgba(10, 10, 26, 0.95);
      border: 1px solid #e94560;
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.8rem;
      line-height: 1.5;
      max-width: 260px;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.15s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    .tooltip.visible { opacity: 1; }

    /* ── Legend ── */
    .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.75rem; color: #aaa; }
    .legend-swatch {
      width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0;
    }

    /* ── Error Banner ── */
    .error-banner {
      background: #e94560;
      color: #fff;
      padding: 16px 40px;
      text-align: center;
      font-weight: 600;
      display: none;
    }

    /* ── Responsive adjustments ── */
    @media (max-width: 900px) {
      .dashboard { grid-template-columns: 1fr; }
      header, .filters, .kpi-row, .dashboard { padding-left: 16px; padding-right: 16px; }
    }
  </style>
</head>
<body>

<!-- Tooltip (shared across all charts) -->
<div class="tooltip" id="tooltip"></div>

<!-- Error Banner -->
<div class="error-banner" id="errorBanner"></div>

<!-- Header -->
<header>
  <h1><span class="emoji">🍫</span> Chocolate Sales Dashboard</h1>
  <div class="upload-wrapper">
    <button class="upload-btn">📂 Upload New CSV</button>
    <input type="file" id="csvUpload" accept=".csv" />
  </div>
</header>

<!-- Filters -->
<div class="filters" id="filterBar">
  <div class="filter-group">
    <label>Country</label>
    <select id="filterCountry"><option value="All">All Countries</option></select>
  </div>
  <div class="filter-group">
    <label>Product</label>
    <select id="filterProduct"><option value="All">All Products</option></select>
  </div>
  <div class="filter-group">
    <label>Salesperson</label>
    <select id="filterPerson"><option value="All">All Salespeople</option></select>
  </div>
  <div class="filter-group">
    <label>Year</label>
    <select id="filterYear"><option value="All">All Years</option></select>
  </div>
  <button class="reset-btn" id="resetFilters">Reset Filters</button>
</div>

<!-- KPI Cards -->
<div class="kpi-row">
  <div class="kpi-card"><div class="value" id="kpiRevenue">—</div><div class="label">Total Revenue</div></div>
  <div class="kpi-card"><div class="value" id="kpiBoxes">—</div><div class="label">Boxes Shipped</div></div>
  <div class="kpi-card"><div class="value" id="kpiTransactions">—</div><div class="label">Transactions</div></div>
  <div class="kpi-card"><div class="value" id="kpiAvg">—</div><div class="label">Avg Order Value</div></div>
</div>

<!-- Charts -->
<div class="dashboard">

  <!-- 1. Revenue by Country — Bar Chart -->
  <div class="chart-card">
    <div class="chart-title"><span class="icon">📊</span> Revenue by Country</div>
    <div id="barChart"></div>
    <div class="legend" id="barLegend"></div>
  </div>

  <!-- 2. Revenue Share by Product — Donut Chart -->
  <div class="chart-card">
    <div class="chart-title"><span class="icon">🍩</span> Revenue by Product (Top 10)</div>
    <div id="donutChart"></div>
    <div class="legend" id="donutLegend"></div>
  </div>

  <!-- 3. Monthly Revenue Trend — Line Chart -->
  <div class="chart-card full-width">
    <div class="chart-title"><span class="icon">📈</span> Monthly Revenue Trend</div>
    <div id="lineChart"></div>
  </div>

  <!-- 4. Amount vs Boxes — Scatter Plot -->
  <div class="chart-card">
    <div class="chart-title"><span class="icon">🔵</span> Amount vs Boxes Shipped</div>
    <div id="scatterChart"></div>
  </div>

  <!-- 5. Top 10 Salespeople — Horizontal Bar Chart -->
  <div class="chart-card">
    <div class="chart-title"><span class="icon">🏆</span> Top 10 Salespeople</div>
    <div id="hBarChart"></div>
  </div>

  <!-- 6. Stacked Bar — Revenue by Country × Year -->
  <div class="chart-card full-width">
    <div class="chart-title"><span class="icon">📚</span> Revenue by Country &amp; Year</div>
    <div id="stackedChart"></div>
    <div class="legend" id="stackedLegend"></div>
  </div>

</div>

<script>
/* =====================================================================
   MAIN DASHBOARD SCRIPT
   ===================================================================== */

// ── Shared Helpers ────────────────────────────────────────────────────

/** Format a number as $X,XXX or $X.XM / $X.XK */
function fmtCurrency(n) {
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
  return '$' + Math.round(n).toLocaleString();
}
/** Format number with commas */
function fmtNum(n) { return Math.round(n).toLocaleString(); }

/** Shared tooltip element */
const tip = d3.select('#tooltip');
function showTip(event, html) {
  tip.html(html).classed('visible', true);
  const bx = tip.node().getBoundingClientRect();
  let left = event.clientX + 14;
  let top  = event.clientY - 10;
  if (left + bx.width > window.innerWidth) left = event.clientX - bx.width - 14;
  if (top + bx.height > window.innerHeight) top = event.clientY - bx.height - 10;
  tip.style('left', left + 'px').style('top', top + 'px');
}
function hideTip() { tip.classed('visible', false); }

// ── Color Palettes ────────────────────────────────────────────────────
const countryColors = d3.scaleOrdinal()
  .domain(['Australia','Canada','India','New Zealand','UK','USA'])
  .range(['#e94560','#0f3460','#533483','#00b4d8','#f77f00','#06d6a0']);

const productColors = d3.scaleOrdinal(d3.schemeTableau10);
const yearColors    = d3.scaleOrdinal().range(['#e94560','#f77f00','#06d6a0','#00b4d8','#533483']);

// ── State ─────────────────────────────────────────────────────────────
let rawData = [];      // full cleaned dataset
let filtered = [];     // after filters applied

// ── Data Loading & Preprocessing ──────────────────────────────────────

/**
 * Parse raw CSV text (or d3-parsed rows) into clean objects.
 * Handles: dollar formatting, date parsing, NaN removal.
 */
function preprocessRows(rows) {
  return rows.map(d => {
    // Clean Amount: remove $ and commas, convert to number
    const rawAmt = (d['Amount'] || d['amount'] || '').toString();
    const amount = parseFloat(rawAmt.replace(/[$,]/g, ''));
    // Parse date (DD/MM/YYYY)
    const rawDate = (d['Date'] || d['date'] || '').toString();
    const parts = rawDate.split('/');
    const date = parts.length === 3
      ? new Date(+parts[2], +parts[1] - 1, +parts[0])
      : null;
    // Boxes
    const boxes = parseInt(d['Boxes Shipped'] || d['Boxes'] || 0, 10);
    return {
      person:  (d['Sales Person'] || d['SalesPerson'] || '').trim(),
      country: (d['Country'] || '').trim(),
      product: (d['Product'] || '').trim(),
      date:    date,
      year:    date ? date.getFullYear() : null,
      month:   date ? d3.timeFormat('%Y-%m')(date) : null,
      amount:  amount,
      boxes:   isNaN(boxes) ? 0 : boxes
    };
  }).filter(d => !isNaN(d.amount) && d.date instanceof Date && !isNaN(d.date));
}

/**
 * Load CSV from path, preprocess, populate filters, render.
 */
function loadCSV(path) {
  d3.csv(path).then(rows => {
    rawData = preprocessRows(rows);
    if (rawData.length === 0) throw new Error('No valid rows after preprocessing.');
    populateFilters();
    applyFilters();
  }).catch(err => {
    // Show error banner if loading fails
    const banner = document.getElementById('errorBanner');
    banner.style.display = 'block';
    banner.textContent = '⚠️ Error loading data: ' + err.message;
    console.error(err);
  });
}

// ── Dynamic CSV Upload ────────────────────────────────────────────────
document.getElementById('csvUpload').addEventListener('change', function () {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function (e) {
    try {
      const rows = d3.csvParse(e.target.result);
      const cleaned = preprocessRows(rows);
      if (cleaned.length === 0) {
        alert('The uploaded CSV has no valid data rows. Please check the format.');
        return;
      }
      rawData = cleaned;
      // Hide any previous errors
      document.getElementById('errorBanner').style.display = 'none';
      populateFilters();
      applyFilters();
    } catch (err) {
      alert('Error parsing CSV: ' + err.message);
    }
  };
  reader.readAsText(file);
});

// ── Filters ───────────────────────────────────────────────────────────

/** Populate dropdown options from current rawData */
function populateFilters() {
  const countries  = [...new Set(rawData.map(d => d.country))].sort();
  const products   = [...new Set(rawData.map(d => d.product))].sort();
  const people     = [...new Set(rawData.map(d => d.person))].sort();
  const years      = [...new Set(rawData.map(d => d.year))].sort();

  fillSelect('filterCountry', countries, 'All Countries');
  fillSelect('filterProduct', products,  'All Products');
  fillSelect('filterPerson',  people,    'All Salespeople');
  fillSelect('filterYear',    years,     'All Years');
}

function fillSelect(id, values, allLabel) {
  const sel = document.getElementById(id);
  const current = sel.value;
  sel.innerHTML = `<option value="All">${allLabel}</option>`;
  values.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = v;
    sel.appendChild(opt);
  });
  // Restore selection if still valid
  if (values.map(String).includes(current)) sel.value = current;
}

/** Apply dropdown filters and re-render all charts */
function applyFilters() {
  const country = document.getElementById('filterCountry').value;
  const product = document.getElementById('filterProduct').value;
  const person  = document.getElementById('filterPerson').value;
  const year    = document.getElementById('filterYear').value;

  filtered = rawData.filter(d => {
    if (country !== 'All' && d.country !== country) return false;
    if (product !== 'All' && d.product !== product) return false;
    if (person  !== 'All' && d.person  !== person)  return false;
    if (year    !== 'All' && String(d.year) !== year) return false;
    return true;
  });

  renderAll();
}

// Attach filter listeners
['filterCountry','filterProduct','filterPerson','filterYear'].forEach(id => {
  document.getElementById(id).addEventListener('change', applyFilters);
});
document.getElementById('resetFilters').addEventListener('click', () => {
  ['filterCountry','filterProduct','filterPerson','filterYear'].forEach(id => {
    document.getElementById(id).value = 'All';
  });
  applyFilters();
});

// ── Render All ────────────────────────────────────────────────────────
function renderAll() {
  renderKPIs();
  renderBarChart();
  renderDonutChart();
  renderLineChart();
  renderScatterChart();
  renderHBarChart();
  renderStackedChart();
}

// ── KPI Cards ─────────────────────────────────────────────────────────
function renderKPIs() {
  const totalRev  = d3.sum(filtered, d => d.amount);
  const totalBox  = d3.sum(filtered, d => d.boxes);
  const count     = filtered.length;
  const avg       = count ? totalRev / count : 0;

  animateValue('kpiRevenue', totalRev, fmtCurrency);
  animateValue('kpiBoxes', totalBox, fmtNum);
  animateValue('kpiTransactions', count, fmtNum);
  animateValue('kpiAvg', avg, fmtCurrency);
}

/** Simple counter animation for KPI values */
function animateValue(id, target, formatter) {
  const el = document.getElementById(id);
  const start = parseFloat(el.dataset.current || 0);
  el.dataset.current = target;
  const duration = 600;
  const t0 = performance.now();
  function tick(now) {
    const p = Math.min((now - t0) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3); // ease-out cubic
    el.textContent = formatter(start + (target - start) * ease);
    if (p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// =====================================================================
// 1. BAR CHART — Revenue by Country
// =====================================================================
function renderBarChart() {
  const container = d3.select('#barChart');
  const margin = { top: 20, right: 20, bottom: 50, left: 70 };
  const width  = 500, height = 320;
  const iw = width - margin.left - margin.right;
  const ih = height - margin.top - margin.bottom;

  // Aggregate data
  const agg = d3.rollups(filtered, v => d3.sum(v, d => d.amount), d => d.country)
    .map(([key, val]) => ({ country: key, revenue: val }))
    .sort((a, b) => b.revenue - a.revenue);

  // Create or select SVG
  let svg = container.select('svg');
  if (svg.empty()) {
    svg = container.append('svg')
      .attr('viewBox', `0 0 ${width} ${height}`)
      .attr('preserveAspectRatio', 'xMidYMid meet');
    svg.append('g').attr('class', 'chart-g').attr('transform', `translate(${margin.left},${margin.top})`);
    svg.select('.chart-g').append('g').attr('class', 'x-axis').attr('transform', `translate(0,${ih})`);
    svg.select('.chart-g').append('g').attr('class', 'y-axis');
    svg.select('.chart-g').append('g').attr('class', 'grid');
  }
  const g = svg.select('.chart-g');

  // Scales
  const x = d3.scaleBand().domain(agg.map(d => d.country)).range([0, iw]).padding(0.3);
  const y = d3.scaleLinear().domain([0, d3.max(agg, d => d.revenue) || 1]).nice().range([ih, 0]);

  // Axes with transition
  g.select('.x-axis').transition().duration(500).call(d3.axisBottom(x));
  g.select('.y-axis').transition().duration(500).call(d3.axisLeft(y).ticks(6).tickFormat(d => fmtCurrency(d)));
  g.select('.grid').transition().duration(500)
    .call(d3.axisLeft(y).ticks(6).tickSize(-iw).tickFormat(''));

  // Bars — enter/update/exit with transition
  const bars = g.selectAll('.bar').data(agg, d => d.country);
  bars.exit().transition().duration(400).attr('y', ih).attr('height', 0).remove();
  const enter = bars.enter().append('rect')
    .attr('class', 'bar')
    .attr('x', d => x(d.country))
    .attr('width', x.bandwidth())
    .attr('y', ih)
    .attr('height', 0)
    .attr('rx', 4)
    .attr('fill', d => countryColors(d.country))
    .style('cursor', 'pointer');
  enter.merge(bars).transition().duration(600).ease(d3.easeCubicOut)
    .attr('x', d => x(d.country))
    .attr('width', x.bandwidth())
    .attr('y', d => y(d.revenue))
    .attr('height', d => ih - y(d.revenue))
    .attr('fill', d => countryColors(d.country));

  // Interactions
  g.selectAll('.bar')
    .on('mouseover', function (event, d) {
      d3.select(this).transition().duration(150).attr('opacity', 0.75);
      showTip(event, `<strong>${d.country}</strong><br>Revenue: ${fmtCurrency(d.revenue)}`);
    })
    .on('mousemove', (event) => showTip(event, tip.html()))
    .on('mouseout', function () {
      d3.select(this).transition().duration(150).attr('opacity', 1);
      hideTip();
    })
    .on('click', function (event, d) {
      // Click to filter by country
      const sel = document.getElementById('filterCountry');
      sel.value = sel.value === d.country ? 'All' : d.country;
      applyFilters();
    });

  // Legend
  renderLegend('#barLegend', agg.map(d => d.country), countryColors);
}

// =====================================================================
// 2. DONUT CHART — Revenue by Product (Top 10)
// =====================================================================
function renderDonutChart() {
  const container = d3.select('#donutChart');
  const size = 340;
  const radius = size / 2 - 20;
  const innerRadius = radius * 0.52;

  // Aggregate and take top 10
  let agg = d3.rollups(filtered, v => d3.sum(v, d => d.amount), d => d.product)
    .map(([key, val]) => ({ product: key, revenue: val }))
    .sort((a, b) => b.revenue - a.revenue);
  const top10 = agg.slice(0, 10);
  const otherRev = d3.sum(agg.slice(10), d => d.revenue);
  if (otherRev > 0) top10.push({ product: 'Other', revenue: otherRev });

  // Pie generator
  const pie = d3.pie().value(d => d.revenue).sort(null).padAngle(0.015);
  const arc = d3.arc().innerRadius(innerRadius).outerRadius(radius).cornerRadius(4);
  const arcHover = d3.arc().innerRadius(innerRadius).outerRadius(radius + 10).cornerRadius(4);

  // SVG
  let svg = container.select('svg');
  if (svg.empty()) {
    svg = container.append('svg')
      .attr('viewBox', `0 0 ${size} ${size}`)
      .attr('preserveAspectRatio', 'xMidYMid meet');
    svg.append('g').attr('class', 'chart-g').attr('transform', `translate(${size/2},${size/2})`);
    // Center total label
    svg.select('.chart-g').append('text').attr('class', 'center-label')
      .attr('text-anchor', 'middle').attr('dy', '-0.2em').attr('fill', '#888').style('font-size', '11px');
    svg.select('.chart-g').append('text').attr('class', 'center-value')
      .attr('text-anchor', 'middle').attr('dy', '1.2em').attr('fill', '#e94560').style('font-size', '18px').style('font-weight', '700');
  }
  const g = svg.select('.chart-g');

  // Center text
  const total = d3.sum(top10, d => d.revenue);
  g.select('.center-label').text('Total');
  g.select('.center-value').text(fmtCurrency(total));

  // Color
  const color = d3.scaleOrdinal(d3.schemeTableau10).domain(top10.map(d => d.product));

  // Arcs
  const arcs = g.selectAll('.slice').data(pie(top10), d => d.data.product);
  arcs.exit().transition().duration(400).attrTween('d', function (d) {
    const i = d3.interpolate(d, { startAngle: d.endAngle, endAngle: d.endAngle });
    return t => arc(i(t));
  }).remove();

  const enter = arcs.enter().append('path')
    .attr('class', 'slice')
    .attr('fill', d => color(d.data.product))
    .attr('stroke', '#1a1a2e')
    .attr('stroke-width', 2)
    .style('cursor', 'pointer')
    .each(function (d) { this._current = { startAngle: d.startAngle, endAngle: d.startAngle }; });

  enter.merge(arcs).transition().duration(700).attrTween('d', function (d) {
    const i = d3.interpolate(this._current, d);
    this._current = i(1);
    return t => arc(i(t));
  });

  // Tooltip & hover
  g.selectAll('.slice')
    .on('mouseover', function (event, d) {
      d3.select(this).transition().duration(150).attr('d', arcHover(d));
      const pct = (d.data.revenue / total * 100).toFixed(1);
      showTip(event, `<strong>${d.data.product}</strong><br>Revenue: ${fmtCurrency(d.data.revenue)}<br>Share: ${pct}%`);
    })
    .on('mousemove', (event) => showTip(event, tip.html()))
    .on('mouseout', function (event, d) {
      d3.select(this).transition().duration(150).attr('d', arc(d));
      hideTip();
    })
    .on('click', function (event, d) {
      const sel = document.getElementById('filterProduct');
      sel.value = sel.value === d.data.product ? 'All' : d.data.product;
      applyFilters();
    });

  // Legend
  renderLegend('#donutLegend', top10.map(d => d.product), color);
}

// =====================================================================
// 3. LINE CHART — Monthly Revenue Trend
// =====================================================================
function renderLineChart() {
  const container = d3.select('#lineChart');
  const margin = { top: 20, right: 30, bottom: 50, left: 70 };
  const width = 1060, height = 320;
  const iw = width - margin.left - margin.right;
  const ih = height - margin.top - margin.bottom;

  // Aggregate by month
  const agg = d3.rollups(filtered, v => d3.sum(v, d => d.amount), d => d.month)
    .map(([key, val]) => ({ month: key, date: d3.timeParse('%Y-%m')(key), revenue: val }))
    .sort((a, b) => a.date - b.date);

  // SVG
  let svg = container.select('svg');
  if (svg.empty()) {
    svg = container.append('svg')
      .attr('viewBox', `0 0 ${width} ${height}`)
      .attr('preserveAspectRatio', 'xMidYMid meet');
    const g = svg.append('g').attr('class', 'chart-g').attr('transform', `translate(${margin.left},${margin.top})`);
    g.append('g').attr('class', 'grid');
    g.append('g').attr('class', 'x-axis').attr('transform', `translate(0,${ih})`);
    g.append('g').attr('class', 'y-axis');
    // Gradient fill
    const defs = svg.append('defs');
    const grad = defs.append('linearGradient').attr('id', 'lineGrad').attr('x1','0').attr('y1','0').attr('x2','0').attr('y2','1');
    grad.append('stop').attr('offset', '0%').attr('stop-color', '#e94560').attr('stop-opacity', 0.35);
    grad.append('stop').attr('offset', '100%').attr('stop-color', '#e94560').attr('stop-opacity', 0.02);
    g.append('path').attr('class', 'area');
    g.append('path').attr('class', 'line');
  }
  const g = svg.select('.chart-g');

  // Scales
  const x = d3.scaleTime()
    .domain(d3.extent(agg, d => d.date) || [new Date(), new Date()])
    .range([0, iw]);
  const y = d3.scaleLinear()
    .domain([0, d3.max(agg, d => d.revenue) || 1]).nice()
    .range([ih, 0]);

  // Axes
  g.select('.x-axis').transition().duration(500)
    .call(d3.axisBottom(x).ticks(d3.timeMonth.every(2)).tickFormat(d3.timeFormat('%b %Y')))
    .selectAll('text').attr('transform', 'rotate(-35)').style('text-anchor', 'end');
  g.select('.y-axis').transition().duration(500).call(d3.axisLeft(y).ticks(6).tickFormat(d => fmtCurrency(d)));
  g.select('.grid').transition().duration(500).call(d3.axisLeft(y).ticks(6).tickSize(-iw).tickFormat(''));

  // Area
  const area = d3.area()
    .x(d => x(d.date)).y0(ih).y1(d => y(d.revenue))
    .curve(d3.curveMonotoneX);
  g.select('.area').datum(agg).transition().duration(700)
    .attr('d', area).attr('fill', 'url(#lineGrad)');

  // Line
  const line = d3.line().x(d => x(d.date)).y(d => y(d.revenue)).curve(d3.curveMonotoneX);
  g.select('.line').datum(agg).transition().duration(700)
    .attr('d', line).attr('fill', 'none').attr('stroke', '#e94560').attr('stroke-width', 2.5);

  // Dots
  const dots = g.selectAll('.dot').data(agg, d => d.month);
  dots.exit().transition().duration(300).attr('r', 0).remove();
  const enterDots = dots.enter().append('circle').attr('class', 'dot')
    .attr('r', 0).attr('fill', '#e94560').attr('stroke', '#1a1a2e').attr('stroke-width', 2);
  enterDots.merge(dots).transition().duration(600)
    .attr('cx', d => x(d.date)).attr('cy', d => y(d.revenue)).attr('r', 4);

  g.selectAll('.dot')
    .on('mouseover', function (event, d) {
      d3.select(this).transition().duration(150).attr('r', 7);
      showTip(event, `<strong>${d3.timeFormat('%B %Y')(d.date)}</strong><br>Revenue: ${fmtCurrency(d.revenue)}`);
    })
    .on('mousemove', (event) => showTip(event, tip.html()))
    .on('mouseout', function () {
      d3.select(this).transition().duration(150).attr('r', 4);
      hideTip();
    });
}

// =====================================================================
// 4. SCATTER PLOT — Amount vs Boxes Shipped
// =====================================================================
function renderScatterChart() {
  const container = d3.select('#scatterChart');
  const margin = { top: 20, right: 20, bottom: 50, left: 60 };
  const width = 500, height = 340;
  const iw = width - margin.left - margin.right;
  const ih = height - margin.top - margin.bottom;

  // Limit to max 600 dots for performance; sample if needed
  let data = filtered;
  if (data.length > 600) {
    const step = Math.ceil(data.length / 600);
    data = data.filter((_, i) => i % step === 0);
  }

  let svg = container.select('svg');
  if (svg.empty()) {
    svg = container.append('svg')
      .attr('viewBox', `0 0 ${width} ${height}`)
      .attr('preserveAspectRatio', 'xMidYMid meet');
    const g = svg.append('g').attr('class', 'chart-g').attr('transform', `translate(${margin.left},${margin.top})`);
    g.append('g').attr('class', 'grid');
    g.append('g').attr('class', 'x-axis').attr('transform', `translate(0,${ih})`);
    g.append('g').attr('class', 'y-axis');
    // axis labels
    g.append('text').attr('class', 'x-label').attr('x', iw/2).attr('y', ih + 40)
      .attr('text-anchor', 'middle').attr('fill', '#888').style('font-size', '11px').text('Boxes Shipped');
    g.append('text').attr('class', 'y-label').attr('transform', 'rotate(-90)')
      .attr('x', -ih/2).attr('y', -48).attr('text-anchor', 'middle').attr('fill', '#888').style('font-size', '11px').text('Amount ($)');
  }
  const g = svg.select('.chart-g');

  const x = d3.scaleLinear().domain([0, d3.max(data, d => d.boxes) || 1]).nice().range([0, iw]);
  const y = d3.scaleLinear().domain([0, d3.max(data, d => d.amount) || 1]).nice().range([ih, 0]);

  g.select('.x-axis').transition().duration(500).call(d3.axisBottom(x).ticks(6));
  g.select('.y-axis').transition().duration(500).call(d3.axisLeft(y).ticks(6).tickFormat(d => fmtCurrency(d)));
  g.select('.grid').transition().duration(500).call(d3.axisLeft(y).ticks(6).tickSize(-iw).tickFormat(''));

  // Points
  const pts = g.selectAll('.pt').data(data, (d, i) => i);
  pts.exit().transition().duration(300).attr('r', 0).remove();
  const enterPts = pts.enter().append('circle').attr('class', 'pt')
    .attr('r', 0)
    .attr('fill', d => countryColors(d.country))
    .attr('opacity', 0.6)
    .attr('stroke', '#fff')
    .attr('stroke-width', 0.5);
  enterPts.merge(pts).transition().duration(600)
    .attr('cx', d => x(d.boxes))
    .attr('cy', d => y(d.amount))
    .attr('r', 4.5)
    .attr('fill', d => countryColors(d.country));

  g.selectAll('.pt')
    .on('mouseover', function (event, d) {
      d3.select(this).transition().duration(100).attr('r', 8).attr('opacity', 1);
      showTip(event, `<strong>${d.person}</strong><br>${d.product}<br>Amount: ${fmtCurrency(d.amount)}<br>Boxes: ${fmtNum(d.boxes)}<br>${d.country}`);
    })
    .on('mousemove', (event) => showTip(event, tip.html()))
    .on('mouseout', function () {
      d3.select(this).transition().duration(100).attr('r', 4.5).attr('opacity', 0.6);
      hideTip();
    });
}

// =====================================================================
// 5. HORIZONTAL BAR CHART — Top 10 Salespeople
// =====================================================================
function renderHBarChart() {
  const container = d3.select('#hBarChart');
  const margin = { top: 10, right: 70, bottom: 30, left: 140 };
  const width = 500, height = 340;
  const iw = width - margin.left - margin.right;
  const ih = height - margin.top - margin.bottom;

  // Aggregate
  const agg = d3.rollups(filtered, v => d3.sum(v, d => d.amount), d => d.person)
    .map(([key, val]) => ({ person: key, revenue: val }))
    .sort((a, b) => b.revenue - a.revenue)
    .slice(0, 10)
    .reverse(); // so #1 is at top

  let svg = container.select('svg');
  if (svg.empty()) {
    svg = container.append('svg')
      .attr('viewBox', `0 0 ${width} ${height}`)
      .attr('preserveAspectRatio', 'xMidYMid meet');
    const g = svg.append('g').attr('class', 'chart-g').attr('transform', `translate(${margin.left},${margin.top})`);
    g.append('g').attr('class', 'x-axis').attr('transform', `translate(0,${ih})`);
    g.append('g').attr('class', 'y-axis');
    g.append('g').attr('class', 'grid');
  }
  const g = svg.select('.chart-g');

  const x = d3.scaleLinear().domain([0, d3.max(agg, d => d.revenue) || 1]).nice().range([0, iw]);
  const y = d3.scaleBand().domain(agg.map(d => d.person)).range([0, ih]).padding(0.25);

  g.select('.x-axis').transition().duration(500).call(d3.axisBottom(x).ticks(5).tickFormat(d => fmtCurrency(d)));
  g.select('.y-axis').transition().duration(500).call(d3.axisLeft(y));
  g.select('.grid').transition().duration(500).call(d3.axisBottom(x).ticks(5).tickSize(ih).tickFormat('')).attr('transform','');

  // Bars
  const bars = g.selectAll('.hbar').data(agg, d => d.person);
  bars.exit().transition().duration(400).attr('width', 0).remove();
  const enter = bars.enter().append('rect').attr('class', 'hbar')
    .attr('y', d => y(d.person)).attr('height', y.bandwidth())
    .attr('x', 0).attr('width', 0).attr('rx', 4)
    .attr('fill', '#e94560');
  enter.merge(bars).transition().duration(600).ease(d3.easeCubicOut)
    .attr('y', d => y(d.person)).attr('height', y.bandwidth())
    .attr('width', d => x(d.revenue));

  // Value labels
  const labels = g.selectAll('.hbar-label').data(agg, d => d.person);
  labels.exit().remove();
  const enterLbl = labels.enter().append('text').attr('class', 'hbar-label')
    .attr('fill', '#ccc').style('font-size', '10px').attr('dy', '0.35em');
  enterLbl.merge(labels).transition().duration(600)
    .attr('x', d => x(d.revenue) + 6)
    .attr('y', d => y(d.person) + y.bandwidth() / 2)
    .text(d => fmtCurrency(d.revenue));

  g.selectAll('.hbar')
    .on('mouseover', function (event, d) {
      d3.select(this).transition().duration(150).attr('opacity', 0.75);
      showTip(event, `<strong>${d.person}</strong><br>Revenue: ${fmtCurrency(d.revenue)}`);
    })
    .on('mousemove', (event) => showTip(event, tip.html()))
    .on('mouseout', function () {
      d3.select(this).transition().duration(150).attr('opacity', 1);
      hideTip();
    })
    .on('click', function (event, d) {
      const sel = document.getElementById('filterPerson');
      sel.value = sel.value === d.person ? 'All' : d.person;
      applyFilters();
    });
}

// =====================================================================
// 6. STACKED BAR CHART — Revenue by Country & Year
// =====================================================================
function renderStackedChart() {
  const container = d3.select('#stackedChart');
  const margin = { top: 20, right: 30, bottom: 50, left: 70 };
  const width = 1060, height = 320;
  const iw = width - margin.left - margin.right;
  const ih = height - margin.top - margin.bottom;

  // Aggregate: country → year → revenue
  const years = [...new Set(filtered.map(d => d.year))].sort();
  const countries = [...new Set(filtered.map(d => d.country))].sort();
  const matrix = countries.map(c => {
    const row = { country: c };
    years.forEach(yr => {
      row[yr] = d3.sum(filtered.filter(d => d.country === c && d.year === yr), d => d.amount);
    });
    return row;
  });

  const stack = d3.stack().keys(years.map(String))(matrix);

  let svg = container.select('svg');
  if (svg.empty()) {
    svg = container.append('svg')
      .attr('viewBox', `0 0 ${width} ${height}`)
      .attr('preserveAspectRatio', 'xMidYMid meet');
    const g = svg.append('g').attr('class', 'chart-g').attr('transform', `translate(${margin.left},${margin.top})`);
    g.append('g').attr('class', 'grid');
    g.append('g').attr('class', 'x-axis').attr('transform', `translate(0,${ih})`);
    g.append('g').attr('class', 'y-axis');
  }
  const g = svg.select('.chart-g');

  const x = d3.scaleBand().domain(countries).range([0, iw]).padding(0.25);
  const y = d3.scaleLinear().domain([0, d3.max(stack, layer => d3.max(layer, d => d[1])) || 1]).nice().range([ih, 0]);

  yearColors.domain(years.map(String));

  g.select('.x-axis').transition().duration(500).call(d3.axisBottom(x));
  g.select('.y-axis').transition().duration(500).call(d3.axisLeft(y).ticks(6).tickFormat(d => fmtCurrency(d)));
  g.select('.grid').transition().duration(500).call(d3.axisLeft(y).ticks(6).tickSize(-iw).tickFormat(''));

  // Layer groups
  const layers = g.selectAll('.layer').data(stack, d => d.key);
  layers.exit().remove();
  const layerEnter = layers.enter().append('g').attr('class', 'layer');

  const allLayers = layerEnter.merge(layers).attr('fill', d => yearColors(d.key));

  // Rects
  allLayers.each(function (layerData) {
    const rects = d3.select(this).selectAll('rect').data(layerData, d => d.data.country);
    rects.exit().transition().duration(400).attr('y', ih).attr('height', 0).remove();
    const enter = rects.enter().append('rect')
      .attr('x', d => x(d.data.country))
      .attr('width', x.bandwidth())
      .attr('y', ih)
      .attr('height', 0)
      .attr('rx', 2)
      .style('cursor', 'pointer');
    enter.merge(rects).transition().duration(600).ease(d3.easeCubicOut)
      .attr('x', d => x(d.data.country))
      .attr('width', x.bandwidth())
      .attr('y', d => y(d[1]))
      .attr('height', d => y(d[0]) - y(d[1]));

    // Tooltip
    d3.select(this).selectAll('rect')
      .on('mouseover', function (event, d) {
        d3.select(this).transition().duration(150).attr('opacity', 0.7);
        const yr = layerData.key;
        const val = d[1] - d[0];
        showTip(event, `<strong>${d.data.country} — ${yr}</strong><br>Revenue: ${fmtCurrency(val)}`);
      })
      .on('mousemove', (event) => showTip(event, tip.html()))
      .on('mouseout', function () {
        d3.select(this).transition().duration(150).attr('opacity', 1);
        hideTip();
      });
  });

  // Legend
  renderLegend('#stackedLegend', years.map(String), yearColors);
}

// ── Legend Helper ──────────────────────────────────────────────────────
function renderLegend(selector, items, colorScale) {
  const el = d3.select(selector);
  el.html('');
  items.forEach(item => {
    const div = el.append('div').attr('class', 'legend-item');
    div.append('div').attr('class', 'legend-swatch').style('background', colorScale(item));
    div.append('span').text(item);
  });
}
